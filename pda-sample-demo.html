<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDA 样品扫描结果 - UI优化Demo</title>
    <style>
        :root {
            --blue: #1989fa;
            --blue-dark: #1890ff;
            --green: #07c160;
            --red: #ee0a24;
            --orange: #ff976a;
            --gray-1: #f7f8fa;
            --gray-2: #f2f3f5;
            --gray-3: #ebedf0;
            --gray-4: #dcdee0;
            --gray-5: #c8c9cc;
            --gray-6: #969799;
            --gray-7: #646566;
            --gray-8: #323233;
            --white: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', sans-serif;
            background: var(--gray-1);
            color: var(--gray-8);
            font-size: 14px;
            max-width: 270px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 56px;
        }

        /* Vant NavBar */
        .van-nav-bar {
            height: 46px;
            background: linear-gradient(to right, var(--blue-dark), #18c1ff);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 12px;
        }
        .van-nav-bar .nav-left {
            position: absolute;
            left: 12px;
            color: #fff;
            font-size: 16px;
        }
        .van-nav-bar .nav-title {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }
        .van-nav-bar .nav-right {
            position: absolute;
            right: 12px;
            color: #fff;
            font-size: 12px;
        }

        /* 样品图片 */
        .sample-image {
            background: var(--white);
            padding: 10px;
            text-align: center;
        }
        .sample-image img {
            width: 100%;
            max-height: 120px;
            object-fit: contain;
            border-radius: 4px;
        }

        /* ===== 核心优化：状态指引横幅 ===== */
        .stage-banner {
            margin: 8px 12px;
            background: #ecf5ff;
            border: 1px solid #b3d8ff;
            border-radius: 6px;
            padding: 10px 12px;
        }
        .stage-banner.done {
            background: #f0f9eb;
            border-color: #c2e7b0;
        }
        .stage-banner .stage-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stage-banner .stage-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--blue);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .stage-banner.done .stage-icon {
            background: var(--red);
        }
        .stage-banner .stage-info { flex: 1; }
        .stage-banner .stage-current {
            font-size: 15px;
            font-weight: 700;
            color: var(--blue);
        }
        .stage-banner.done .stage-current {
            color: var(--red);
        }
        .stage-banner .stage-target {
            font-size: 11px;
            color: var(--gray-7);
            margin-top: 2px;
        }

        /* ===== 核心优化：进度条 ===== */
        .progress-strip {
            margin: 0 12px 8px;
            background: var(--white);
            border-radius: 6px;
            padding: 10px 14px;
            border: 1px solid var(--gray-3);
        }
        .progress-nodes {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        .progress-nodes::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 10px;
            right: 10px;
            height: 2px;
            background: var(--gray-3);
        }
        .progress-nodes .fill-bar {
            position: absolute;
            top: 8px;
            left: 10px;
            height: 2px;
            background: var(--green);
            transition: width 0.3s;
        }
        .p-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .p-node .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--gray-4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #fff;
            margin-bottom: 3px;
        }
        .p-node.done .dot { background: var(--green); }
        .p-node.active .dot {
            background: var(--blue);
            box-shadow: 0 0 0 2px rgba(25,137,250,0.2);
        }
        .p-node .p-label {
            font-size: 9px;
            color: var(--gray-6);
        }
        .p-node.done .p-label { color: var(--green); }
        .p-node.active .p-label { color: var(--blue); font-weight: 600; }

        /* Demo switcher */
        .demo-switcher {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 270px;
            margin: 0 auto;
            background: #fff;
            border-top: 1px solid var(--gray-3);
            padding: 8px;
            display: flex;
            gap: 4px;
            z-index: 100;
        }
        .demo-switcher button {
            flex: 1;
            padding: 6px 2px;
            border: 1px solid var(--gray-4);
            border-radius: 4px;
            background: #fff;
            font-size: 10px;
            color: var(--gray-7);
            cursor: pointer;
        }
        .demo-switcher button.active {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }
    </style>
</head>
<body>
    <!-- NavBar -->
    <div class="van-nav-bar">
        <span class="nav-left">‹</span>
        <span class="nav-title">样品扫描结果</span>
    </div>

    <!-- 样品实物图片 -->
    <div class="sample-image">
        <img src="https://placehold.co/250x120/f5f5f5/999?text=样品实物图片" alt="样品实物">
    </div>

    <!-- 核心优化：状态指引 -->
    <div class="stage-banner" id="stageBanner">
        <div class="stage-row">
            <div class="stage-icon" id="stageIcon">→</div>
            <div class="stage-info">
                <div class="stage-current" id="stageCurrent">待质检</div>
                <div class="stage-target" id="stageTarget">请送往 → 质检工作台</div>
            </div>
        </div>
    </div>

    <!-- 核心优化：进度条 -->
    <div class="progress-strip">
        <div class="progress-nodes" id="progressBar">
            <div class="fill-bar" id="fillBar"></div>
        </div>
    </div>

    <!-- Demo切换器 -->
    <div class="demo-switcher">
        <button class="active" onclick="setStage(0)">来样确认</button>
        <button onclick="setStage(1)">质检</button>
        <button onclick="setStage(2)">拍照</button>
        <button onclick="setStage(3)">待入库</button>
        <button onclick="setStage(4)">待退货</button>
    </div>

    <script>
    // 进度条节点
    const progressNodes = ['来样确认', '质检', '拍照', '使用完成'];

    // 全部状态定义
    const stages = [
        { name: '来样确认', target: '新品请送往 → TQE检验；老品请移交仓库人员', progressIndex: 0 },
        { name: '质检', target: '请送往 → 质检工作台', progressIndex: 1 },
        { name: '拍照', target: '请送往 → 拍照工作台', progressIndex: 2 },
        { name: '待入库', target: '请分拣至待入库货堆！\n操作PDA首页＜收货入库＞扫码一键签收入库', progressIndex: 3, type: 'done' },
        { name: '待退货', target: '请分拣至待退货货堆！\n操作PDA首页＜收货入库＞扫码一键签收入库', progressIndex: 3, type: 'done' }
    ];

    function renderProgress(activeProgressIndex) {
        const bar = document.getElementById('progressBar');
        const fillBar = document.getElementById('fillBar');

        bar.querySelectorAll('.p-node').forEach(n => n.remove());

        progressNodes.forEach((name, i) => {
            const status = i < activeProgressIndex ? 'done' : i === activeProgressIndex ? 'active' : '';
            const node = document.createElement('div');
            node.className = 'p-node ' + status;
            const dotContent = i < activeProgressIndex ? '✓' : (i + 1);
            node.innerHTML = `
                <div class="dot">${dotContent}</div>
                <div class="p-label">${name}</div>
            `;
            bar.appendChild(node);
        });

        const totalWidth = bar.offsetWidth - 20;
        const fillWidth = activeProgressIndex / (progressNodes.length - 1) * totalWidth;
        fillBar.style.width = fillWidth + 'px';
    }

    function setStage(index) {
        const stage = stages[index];
        const banner = document.getElementById('stageBanner');
        const targetEl = document.getElementById('stageTarget');

        if (stage.type === 'done') {
            banner.className = 'stage-banner done';
            document.getElementById('stageCurrent').textContent = '使用完成 - ' + stage.name;
            document.getElementById('stageIcon').textContent = '!';
            targetEl.innerHTML = stage.target.replace('\n', '<br>');
        } else {
            banner.className = 'stage-banner';
            document.getElementById('stageCurrent').textContent = '待' + stage.name;
            document.getElementById('stageIcon').textContent = '→';
            targetEl.textContent = stage.target;
        }

        renderProgress(stage.progressIndex);

        document.querySelectorAll('.demo-switcher button').forEach((b, i) => {
            b.classList.toggle('active', i === index);
        });
    }

    // 初始化：待质检
    setStage(1);
    </script>
</body>
</html>
